<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Horarios - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Horarios de Empleados</h2>
        <div>
            <a href="/admin/usuarios" class="btn btn-secondary me-2">Usuarios</a>
            <a href="/logout" class="btn btn-outline-secondary">Cerrar sesión</a>
        </div>
    </div>

    <table class="table table-striped table-bordered shadow-sm bg-white">
        <thead class="table-dark">
            <tr>
                <th>Empleado</th>
                <th>Cédula</th>
                <th>Entrada</th>
                <th>Salida</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="h : ${horarios}">
                <td th:text="${h.usuario.nombre}"></td>
                <td th:text="${h.usuario.cedula}"></td>
                <td th:text="${#temporals.format(h.entrada, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${h.salida != null ? #temporals.format(h.salida, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                <td>
                    <span th:class="${h.estado == 'En línea'} ? 'badge bg-success' : 'badge bg-secondary'"
                          th:text="${h.estado}"></span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
