<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mis Horarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Mis Horarios</h2>
        <div>
            <a href="/usuario/perfil" class="btn btn-secondary me-2">Mi Perfil</a>
            <a href="/logout" class="btn btn-outline-secondary">Cerrar sesión</a>
        </div>
    </div>

    <!-- Mensajes -->
    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Botones de entrada/salida -->
    <div class="card shadow mb-4">
        <div class="card-body d-flex gap-3">
            <form th:action="@{/usuario/entrada}" method="post">
                <button type="submit" class="btn btn-success"
                        th:disabled="${tieneEntradaActiva}">
                    ✅ Registrar Entrada
                </button>
            </form>
            <form th:action="@{/usuario/salida}" method="post">
                <button type="submit" class="btn btn-danger"
                        th:disabled="${!tieneEntradaActiva}">
                    🚪 Registrar Salida
                </button>
            </form>
        </div>
    </div>

    <!-- Historial -->
    <table class="table table-striped table-bordered shadow-sm bg-white">
        <thead class="table-dark">
            <tr>
                <th>Entrada</th>
                <th>Salida</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="h : ${horarios}">
                <td th:text="${#temporals.format(h.entrada, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${h.salida != null ? #temporals.format(h.salida, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                <td>
                    <span th:class="${h.estado == 'En línea'} ? 'badge bg-success' : 'badge bg-secondary'"
                          th:text="${h.estado}"></span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
